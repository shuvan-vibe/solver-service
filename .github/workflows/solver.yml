name: Turnstile Solver Service

on:
  # Manual trigger from GitHub Actions UI
  workflow_dispatch:
  # Auto-restart every 5 hours (GitHub kills jobs at 6 hours)
  schedule:
    - cron: "0 */5 * * *"

jobs:
  run-solver:
    runs-on: ubuntu-latest

    env:
      PY_COLORS: "1"
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install Linux Dependencies (Locale, Virtual Display, Fonts)
      run: |
        sudo apt-get update
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
          tzdata \
          locales \
          python3-tk \
          python3-dev \
          python3-xlib \
          scrot \
          fonts-liberation \
          fonts-noto \
          fonts-noto-color-emoji
        sudo locale-gen en_US.UTF-8
        sudo update-locale LANG=en_US.UTF-8

    - name: Install Python Requirements
      run: |
        python -m pip install --upgrade pip wheel setuptools
        pip install -r requirements.txt

    - name: Install Cloudflare Tunnel
      run: |
        curl -L 'https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64' -o cloudflared
        chmod +x cloudflared

    - name: Quick Solve Test
      env:
        PROXY_URL: ${{ secrets.PROXY_URL }}
        SCREENSHOT_DIR: /tmp/solver-screenshots
      run: |
        echo "=== Starting solver for a quick test ==="
        python main.py &
        SERVER_PID=$!
        sleep 5

        echo "=== Testing /getToken endpoint ==="
        RESULT=$(curl -s --max-time 120 http://127.0.0.1:8080/getToken)
        echo "Result: $RESULT"

        # Check if it succeeded
        echo "$RESULT" | python -c "
        import sys, json
        data = json.load(sys.stdin)
        if data.get('success'):
            print('TEST PASSED! Token: ' + data['token'][:40] + '...')
        else:
            print('TEST FAILED: ' + data.get('error', 'unknown'))
        "

        # Kill the test server
        kill $SERVER_PID 2>/dev/null || true
        sleep 2

    - name: Start Solver API Server
      env:
        PROXY_URL: ${{ secrets.PROXY_URL }}
        SCREENSHOT_DIR: /tmp/solver-screenshots
      run: |
        echo "=== Starting Solver API ==="
        python main.py &
        sleep 5
        echo "Solver API is running on port 8080"

    - name: Start Cloudflare Tunnel
      run: |
        echo "==========================================="
        echo "  STARTING CLOUDFLARE TUNNEL"
        echo "  Look for the .trycloudflare.com URL below"
        echo "  Use that URL as CUSTOM_SOLVER_URL"
        echo "==========================================="
        ./cloudflared tunnel --url http://127.0.0.1:8080
